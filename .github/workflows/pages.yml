name: pages

on:
  push:
    branches: [main]
    paths: ['web/**', 'media/**', 'icon.png', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (viewer reused verbatim from the extension)
        run: |
          mkdir _site
          cp web/index.html web/site.css web/app.js web/parsers.js _site/
          cp media/main.js media/style.css _site/
          cp icon.png _site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

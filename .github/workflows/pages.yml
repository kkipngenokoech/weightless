name: pages

on:
  push:
    branches: [main]
    paths: ['web/**', 'media/**', 'icon.png', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (viewer reused verbatim from the extension)
        run: |
          mkdir _site
          cp web/index.html web/site.css web/app.js web/parsers.js _site/
          cp media/main.js media/style.css _site/
          cp icon.png _site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Mirror to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::notice::HF_TOKEN secret not set — skipped Hugging Face Space deploy"
            exit 0
          fi
          pip install -q huggingface_hub
          cat > _site/README.md <<'MD'
          ---
          title: Weightless
          emoji: 🪶
          colorFrom: blue
          colorTo: indigo
          sdk: static
          pinned: false
          license: mit
          short_description: Inspect models without loading the weights
          ---
          # Weightless
          Inspect `.safetensors` / `.gguf` models without loading the weights — header-only reads,
          straight from the Hub or a local file. Source: https://github.com/kkipngenokoech/weightless
          MD
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          api.create_repo('kkipngenokoech/weightless', repo_type='space', space_sdk='static', exist_ok=True)
          api.upload_folder(folder_path='_site', repo_id='kkipngenokoech/weightless', repo_type='space',
                            commit_message='sync from GitHub ' + os.environ.get('GITHUB_SHA', '')[:7])
          print('Space updated: https://huggingface.co/spaces/kkipngenokoech/weightless')
          "
